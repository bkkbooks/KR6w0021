body:
  text: 一八大童子一字出生八大童子法云不空譯有八童子一恵光菩金剛云迴光即以恵如照迴一切故二恵喜菩金剛云迴喜即迴恵為喜三阿耨達菩四指徳五烏俱婆誐六清淨比丘七𭚾羯羅八制吒迦云云不動使者陁羅尼秘密法云迴光菩迴喜并阿耨丈夫志德并憂丘婆丘清淨比丘云云出生八童子八大童子法云金剛手言一切眾生意相不同或順或𨒫是故如來現慈悲身随作利益觧云諸佛大慈愍眾生故即捨順者以順而勸若於𨒫者以𨒫而制也一佛住忿怒三昧時十方諸佛同共入忿怒嗔三昧豈毗盧遮那於无相中示現眀王時諸佛菩更不現忿怒身㢤是故四方如來現教令身降伏眾魔雖然猶不親随逐所以本誓不同或降三世并降伏天魔及三世貪瞋癡或軍荼利菩調伏常随魔謂毗那夜迦及人魔或熖魔持迦降伏龍魔及諸𭜨歒或金剛藥叉調伏鬼魔及无智者如是種種不可具不動明王恒随行者若夫若毗那夜迦若龍若鬼所作障礙一時消滅然諸佛菩若同住一三昧者可有随不動弘誓之使者爰有中三蔵不空能達明道即披見秘蔵要文有不動明一字心密語即以八字嚴一字其八字者即歸命句也以字為本尊若尒寧上八字无其形所以者何八字一一皆歸命敬唅之一字故其八字出生歸敬使者圍繞於之本尊所以有八大童子云云當四智四波羅蜜又云有八大童子是使者四智四波羅蜜為親随順大日教令故顕現此形圍繞聖无動尊也各別真言中顯示其義解云東方金剛部即并心門以日光為喻所以出生使者名恵光南方寶部即福徳門所以出生使者名惠喜以福智二嚴為喜故而方蓮華部即智恵門所以出生使者名阿耨達此云無𤍽表蓮花生池水而清淨无垢故北方年石部即精進門所以出生使者名指徳也今此部指前三部徳即依精進能得果故所以名指徳已上四智金剛波羅蜜即菩提心行所以出現使者名烏俱婆誐此云超越住世也寶波羅蜜福徳心門所以出生使者名清淨比丘能守護諸法寶故法波羅蜜慈悲心行所以出現使者名矝羯攞此云随順業波羅蜜即方便心行所以出生使者名制吒迦此云息災也菩方便現瞋形故也云云各別印真言又云若行者欲得現當𢘤地者行法之中稱彼各名請乞救護及結印誦咒即成一切世間殊勝𢘤地恵光童子菩真言印金剛合掌忍願合如針唵嚩日羅二合一摩帝入縛二合攞二菩地質多曩歸命本尊恵喜并真言曰金合忍願如寶形唵羅怛曩二合一摩帝沙度二摩訶摩𡰱三莫歸命本尊阿耨達菩真言曰金合忍願如蓮唵鉢納麼二合一縛哪引賀鉢羅二合捨𭤶曩二摩訶達麼三参歸命本尊指徳童子真言曰金合忍願入掌面相合唵羯羅麼二合摩訶吠哩耶大无畏也鉢里布羅迦願滿歸命本尊烏俱婆誐童子真言曰金剛合掌唵嚩日羅二合一埵婆二合烏俱婆誐摩訶燥企耶二合四歸命本尊清淨比丘使者真言曰梵夾印唵摩𡰱尾輸駄達麼俱嚕二羅乞叉達麼三縛歸命本尊𭚾羯羅童子真言曰蓮華合掌唵達嚕麼一矝羯羅二底瑟吒三縛日羅二合歸命本尊制吒迦童子真言曰外縛五鈷印唵羯嚕麼一制吒迦二吽三發吒四南歸命本尊形像又像法行者點取一清靜𩂜勿令見人及与非人即行者与工人共清淨著新淨衣取白㲲或淨板或淨衣令𥁞本尊与八童子恵光之形少忿怒著天冠身白黃色右手持五智杵左手蓮上置日輪袈裟瓔珞種種㽵嚴次恵喜形似慈面現微笑相色如紅蓮左手持摩尼右手持三釵鈎阿耨達菩形如梵王色如真金頂戴金翅鳥左手執蓮花右手持獨鈷杵而𡸁龍王指德菩薩形如夜叉色如虛空而有三目著鏎鏪左手持錀右手三釵鉾烏俱婆誐戴五鈷冠現暴𢙣相身如金色左手執嚩日羅右手作拳印清淨比丘剃除首髻而著法袈裟於右肩結𡸁左手執梵天右手當心持五鈷杵左肩現露於腰緾赤裳其面貌非若非𦒳目如青蓮其口上牙於下顯出次𭚾羯羅形如十五嵗童着蓮花冠身白肉色二手合掌其二大指与頭指閒橫一鈷杵天衣袈裟微妙嚴飾次制吒迦𡖋如童子色如紅蓮頭結五髻一結頂上之中一結額上三結頭左右一結頂後表五方五智左手嚩日羅右手執金剛棒順𢙣性之者故不着袈裟然以天衣緾其頸肩畫像法已竟二四使者一俱力迦羅名号聖无動尊决秘要云目行述矩里迦唐云作尊勑云云本身佛頂尊勝三種𢘤地法上云大日如來身成憾字反成釰釰反成不動明王身明王反成瞿梨伽羅大龍現忿怒相緾利釰種子阿字俱力迦羅軓云口大日成不動及不動成釰釰上想字及成龍王云云决秘要義云𮀁里迦唐云作尊勑龍王口法口阿字反成此龍使者此字是種子𭂫持誦者皆有此心希求无上菩提故釰上觀此字此生一切法也即菩提心也行點者成就福智故大空者是成菩提也涅槃點者是除遣義諸垢入涅槃也是字猶如大龍王有大威德興雲雨一切自在故阿字亦復如是如來作事皆此字出生三形釰口形像虵形底哩經下云又於壁上畫釰契又畫句律迦大虵緾釰上其釰周圍有火焔云云立軓云又法壁𦘕釰以俱哩迦龍緾文於釰上迦持一千反云云使者軓云若欲使古力迦龍王者於壁上𦘕一切釰以古繞力龍王纔此釰上龍王如虵云云聖无動尊决秘要義云四行述次𮀁里迦唐云作尊勑龍王像法其形如虵作雷電之勢身金色繫如意寶三昧焔起四蹴踰之形背竪七金𡬺利針額生一攴三角緾繞釰上書婀字兼用觀心一一分明云可𦒱人形使者軓云口心念不動使誦一百八遍一日三時滿六箇月多誦益好善月滿已復右力迦龍王自頂其身視作人形狀恒常相随遂行人任所駈使云云决秘要義云若作人相者面目喜怒遍身甲猶如毗嚕愽叉王左手託腰索右屈肘向上執釰頂上置龍王蟠立金𡬺山又別本云迦里迦龍王如天神凞怡之頭上𦘕出七頭龍胡跪仰視如來令捧寶蓮花云云可𦒱本印俱利迦羅軓云俱利迦羅龍王現身下真言二手作忿怒拳舉二肩真言曰以俱力迦龍王不動明王真言印二手金𡬺合掌二火二空開散二小指入掌中真言曰心中心印內縛二水二火開散心真言不動如來大日如來龍王現身根本真言誦妙真言必現身徃生十方淨土若拜尊容至阿耨菩提終不随三𢙣道左右无名少指掌內相叉二中指直立相跓以二食相跓中指背上莭以二大指小曲各柱二食指內中莭來去曩莫三滿歺勃駄南俱留迦耶迦羅惹銘伽扇你曳娑婆訶次俱力迦羅龍王密術真言印內縛二申𢫾二大指用散此密印也那莫三𭦟多次俱力迦羅及身印真言大日如來也二手合掌二風二空端相着二水開立言曰次金剛躰身真言唵唅吽嚩日羅麼曳嚩日羅次海三昧印真言唵嚩日羅赦次常住火光三昧印真言唵折羅赦悍若行者恒𡐊此俱力迦羅龍王念自然成護摩火光三昧四明王皆此龍王用力掌有行人身上阿字有其中釰遍含五𩂜字遍躰成无動尊金剛身如是觀已誦一字真言那莫三𭦟多嚩日羅赦憾云云决秘要義云次龍王法身印真言左右无名小指掌內相叉二中指直竪相跓以二食指跓中指背上莭以二大指少曲各住二食指內中莭頭指來去在肘如後真言曰曩莫三澷多勃駄喃唵一布祇布祇二步䤈布伽跛夜三吽莎訶上音四一切龍王法身印以右羽頭在左羽內以右後四指小指母頭少曲之左手返曲句右手上𡖋如是兩手相向如虵口以二手四指開合來去真言前次花座印二手指似曲不曲皆向上竪二小指相去二寸二无名二中各相去二寸二頭指去四寸並竪大指二指相着次牙印屈右肘向上屈无名小指在掌中指直竪屈頭指側着中指中莭以大指捻頭指側若作壇供養時莭作此印誦真言言言用前喚入壇中即淂一切皆𢘤歡喜若欲祈雨當具作壇供養即得降雨三七五七也九八十一法具在別支文次根本真言曩莫三滿多勃駄南俱哩迦哦曩那迦羅若銘伽扇你曳莎嚩二合訶生用前之印悲願消除病患又云有病患者當結龍王身印加持即執釰釰上運心觀想婀字及成金龍忿怒光曜之㒵令視病人即得除差消除病又云若有栗訶魅鬼之着誐栗行疫病之持位在南西方及虎病種種苦𢙉事當作一時肘水壇四角置賢瓶口插生花若无生花用綵花𡖋淂四方置四噐盛滿香水諸供具物布列㽵嚴即勸請龍王安住壇上壇中方置釰啟白事由礼拜供養誦真言加持一百八遍執刀加被病人即淂消滅即發遣誦破壇明次觀風輪破壇了不護令久住是法秘中秘也莫專輙俱里迦龍者諸龍之中王具出文殊師利法云云駈使行者不動使者陁羅𡰱秘法云若欲使古力迦龍王者於壁上𦘕一釰以古力迦龍王繞此釰上龍王居形如虵釰中書阿字心中𡖋自觀此釰及字了了分明心念不動使者誦一百八返一月三時滿六箇月多誦益好若月滿已後古力迦龍王自現其身現作人形狀恒常相随逐任駈使云云二制吒迦使者名号二童子法云聖无動尊制吒迦法又名扇底迦唐云息災是尊者不動王之福徳㽵嚴也故名福徳聚勝者壇埸㽵嚴又云於蜜室中於一淨床舖新廗及耨屏風淨按按上新有中着香鑪乳粥銅匙果子二盤焚羨香以時花菓每食時常奉一分食持妄瞋云云種子口三形像又云畫像法其像乗白馬馬作驟勢項下懸鈴子童子頂有五髻身着緋衣形如十五歲兒也現喜怒相執裘枝杖言又云密印法二水外相刃地火並令竪二空𡖋如地風開五𦙶形是大秘密成標𤎼一切事是名制吒迦內滿𢘤地法真言印曩莫三𭦟跢句一勃駄南句二唵句三迦蘭迦羅句四阿𢍆尾嚕上句五制吒迦句六枳惹句七娑縛二合訶從白月八日始至十五日滿誦三十万遍若自余時時別一百八返為限所求皆遂若未現者即於後月唯前念誦如是下根人不遇三度即現云云准前念誦如是下根人不過三度即現云云俱力迦羅䡄金剛三藏次誓陁迦印真言二手內縛二地二風開散小曲相成唵嚩日羅赦吽拪陁迦野娑嚩賀云云三矝羯羅使者名号二童子法云聖无動尊𭚾羯落法唐云卑下者又云随順又名恭敬者是不動王之智恵㽵嚴也云云道場㽵嚴如制吒迦種子口三形形像又云其像形如喜見童子作慈悲狛頂有蓮花左手持杵右手執蓮花或者作降態時童子即作瞋形額現父左手執索右手把釰大體如聖尊而乗師子王影向壇前云云决秘要義三次聖无動尊成就使者法品云若畵𭚾羯唐云龍作者童子者大躰如正尊頭髮迴毛不聳莎髮不壞出面目喜怒左持索右執行刀被袈裟着裙裳翹石上身赤黃色云云類秘抄云陁羅尼經云緊羯羅品五若欲受持緊羯羅者聖者不空羂索緊羯羅一切作事𢘤皆成弁作於夜叉童子之形瞋面怒目髮赤黃色向上聳竪猶如火焰鼻作䐔䏲狗牙上出㕸舌舐脣身有兩臂着赤色衣一手持索一切嚴具以為嚴茤麻布上畵其形像云云印二童子法云真言曰印用尊合花掌印曩莫三𭦟多勃駄南句一唵句二𭚾羯落句三戰拏句四阿上戰拏句五抹怛里也二合句六納婆嚩句七娑嚩賀𭚾羯落忿怒真言曰曩莫三滿多嚩日二合赦𭚾羯落戰拏吽泮吒又有心真言唵地里𭚾娑嚩二合賀制吒迦并𭚾羯落法已上秘秘故可授云云俱力迦羅軓云次金迦羅印真言釈迦此也印二手金剛合掌二中指二大指入掌中即成真言曰唵金迦羅耶縛日羅决秘要義云已上二像同以三昧耶使者印真言云云𥝠云此三昧耶使者真言者若使者䡄所不動使者根本真言欤可問明師二童子䡄不空所譯金剛手光明灌頂經不動立印䡄中秘二使者不出其名唯有兩真言即父云聖者不動尊一切真言云云其第一咒用金剛印者是𭚾羯落真也復次真用渴誐印者是制吒迦真言也是故金剛智所譯不動使者陁羅𡰱秘密法中以此二真言別為𭚾羯羅制吒迦真言智者能觧了云云駈使行者不動使者陁羅𡰱秘法云若欲淂使𭚾羯羅成就者月生一日起首早晨清淨於畫像前散花以檀香泥地作壇咒一百八遍日中午黃昬各誦一百八遍若多誦不絕㝡好余時不能誦咒但向道場中坐一心正念誦至時而誦𡖋淂至十五日滿即造種種飲食供養畫像前㑅方一肘方坑深一折手指燒遏迦木若无用苦練木𡖋淂取白芥子一斗五升黃昬起首誦咒取杳人一合許芥子咒之二遍了即投於火中燒之其芥子以蘓泮和之令濕如此燒咒至夜半後𭚾迦羅現形云湏作何駈使行人報云湏𭚾迦羅今日已後有事湏問常相随逐更莫東西𭚾羯羅者問事也又羯羅者駈使者也若不現者心次㝎念誦不動使者必湏淂見莫生狐疑直至于平明无不來現者現已種種駈使𠁅分皆淂乃至洗手或用柳枝令取皆淂欲淂上天入地扶行人將去云云二童子本身佛頂尊勝三種𢘤地法上云口瞿梨伽羅大龍口及及成二人使者𭚾迦羅使者制吒伽羅使者此也云云𥝠云此二使者有二本身一者全如今又二者不動也其父有十九觀云云四蓮花吉祥種子室利字三形如意寶已上二種依形像法注之形像聖无動尊决秘要義云次蓮花大吉祥天像天身端正赤白色二臂畫作種種瓔珞環釧耳璫天衣寶冠天女左手持如意珠右手施无畏寶臺上坐云云印俱力迦羅䡄云次蓮花吉祥印真言蓮花吉祥觀音是也部主也二羽合掌二水二風內相叉曩莫叁𭦟多縛日羅赦吽吽膩曳陁羅野莎訶聖无動尊决秘要義云目行撰之其手印相者衍其兩臂然後合其二手掌相著並二大指相去一寸許微曲二頭指如鈎以余三相兩兩相擬如蓮花作已誦此真言曰唵毗麼羅羅代底三婆羅吽㑅是法時心所樂者皆淂如意作法法後必誦是真言一切所務皆𢘤吉祥若觀見是者三日夜不喫食佛前以都嚕瑟迦梨唐云蘓合香及散白花一百八遍護摩天女現身其行者所求一切財寶及一切事皆淂稱心滿行者願印䡄云復次成就法以蘓酪密蓮花搵護摩滿一洛叉遍蓮花大吉祥天女而現前滿彼行者願云云俱力迦羅䡄云此四使者加不動成五使者大日如來五智成身此也云云建久五𥝝八月日清書了老比丘興然記之建久六𥝝八月廿一日於高尾山以慈尊院本申時許書之一交了寬紹本
